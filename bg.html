<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Inspired Premium Hero Section</title>
    <style>
        /* Reset & Layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Pushes content to the left side */
        }

        /* 1. The Background Image with a Darker/Softer Tint Overlay */
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.25)), /* Softens the image */
                url('japan-bg.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* 2. Falling Petals Overlay */
        .petals-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .petal {
            position: absolute;
            background: linear-gradient(135deg, #ffb7c5, #ff94a2);
            border-radius: 15px 1px 15px 15px;
            opacity: 0.8;
            animation: driftAndFall linear infinite;
        }

        @keyframes driftAndFall {
            0% { transform: translateY(-5vh) translateX(0) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.9; }
            90% { opacity: 0.9; }
            100% { transform: translateY(105vh) translateX(40vw) rotate(720deg) scale(1.2); opacity: 0; }
        }

        .petal:nth-child(1) { width: 14px; height: 10px; left: 5%;  animation-duration: 8s;  animation-delay: 0s; }
        .petal:nth-child(2) { width: 18px; height: 12px; left: 15%; animation-duration: 11s; animation-delay: 2s; }
        .petal:nth-child(3) { width: 12px; height: 8px;  left: 2%;  animation-duration: 7s;  animation-delay: 4s; }
        .petal:nth-child(4) { width: 16px; height: 11px; left: 22%; animation-duration: 9s;  animation-delay: 1s; }

        /* 3. The Professional Frosted Glass Card */
        .content-card {
            margin-left: 8%; /* Off-center alignment */
            max-width: 450px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.65); /* Semi-transparent white */
            backdrop-filter: blur(12px); /* The magic premium blur effect */
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            color: #1a252c;
        }

        .content-card h1 {
            font-size: 2.5rem;
            margin: 0 0 15px 0;
            font-weight: 700;
            line-height: 1.2;
            color: #111;
        }

        .content-card p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4a5560;
            margin-bottom: 25px;
        }

        /* A neat designer call-to-action button */
        .cta-button {
            display: inline-block;
            padding: 12px 28px;
            background-color: #b82e2e; /* Torii Gate red */
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 6px;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 4px 12px rgba(184, 46, 46, 0.3);
        }

        .cta-button:hover {
            background-color: #962222;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="hero-background"></div>

    <div class="petals-container">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
    </div>

    <div class="content-card">
        <h1>Discover Tranquility</h1>
        <p>This layout uses asymmetrical spacing, subtle text shadow control, and a modern glassmorphism container to blend seamlessly with the artwork behind it.</p>
        <a href="#" class="cta-button">Explore Now</a>
    </div>

</body>
</html>
